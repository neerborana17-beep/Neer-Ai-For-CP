<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zayra AI</title>

<style>
body { font-family:sans-serif; margin:0; }
#chat { height:80vh; overflow:auto; padding:10px; }
.msg { margin:6px; padding:10px; border-radius:10px; max-width:75%; }
.user { background:#fff; margin-left:auto; }
.ai { background:#dcf8c6; }

#inputArea { display:flex; padding:10px; }
input { flex:1; padding:10px; border-radius:20px; border:none; }
button { width:50px; margin-left:5px; }

#mic { background:#00a884; color:#fff; border-radius:50%; }
#mic.active { background:red; }
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="text" placeholder="Message">
<button onclick="send()">➤</button>
<button id="mic">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");

let currentAudio = null;
let recognition = null;
let listening = false;

// --- ADD MESSAGE ---
function add(text, cls){
    const d=document.createElement("div");
    d.className="msg "+cls;
    d.innerText=text;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;

    if(cls==="ai") playVoice(text);
}

// --- SEND ---
async function send(){
    const msg=input.value.trim();
    if(!msg) return;

    add(msg,"user");
    input.value="";

    try{
        const res=await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:msg})
        });

        const data=await res.json();
        add(data.reply,"ai");

    }catch{
        add("network issue 😅","ai");
    }
}

// --- VOICE PLAY ---
async function playVoice(text){
    try{
        if(currentAudio){
            currentAudio.pause();
            currentAudio = null;
        }

        const res=await fetch("/speak",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({text})
        });

        const data=await res.json();

        if(data.audio){
            currentAudio = new Audio(data.audio);

            await currentAudio.play().catch(()=>{
                console.log("tap required");
            });
        }

    }catch(e){
        console.log("voice error",e);
    }
}

// --- MIC INIT ---
function initMic(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return;

    recognition = new SR();
    recognition.lang = "en-IN";
    recognition.continuous = false;

    recognition.onresult = (e)=>{
        input.value = e.results[0][0].transcript;
        send();
    };

    recognition.onend = ()=>{
        listening = false;
        document.getElementById("mic").classList.remove("active");
    };

    recognition.onerror = ()=>{
        listening = false;
    };
}

// --- MIC TOGGLE ---
function toggleMic(){
    if(!recognition) return;

    const btn = document.getElementById("mic");

    if(!listening){
        recognition.start();
        listening = true;
        btn.classList.add("active");
    }else{
        recognition.stop();
        listening = false;
        btn.classList.remove("active");
    }
}

document.getElementById("mic").onclick = toggleMic;
window.onload = initMic;
</script>

</body>
</html>
