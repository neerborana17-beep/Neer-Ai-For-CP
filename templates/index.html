<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayravati - Udaipur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Royal Theme & Smooth UI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #8e2de2; background: linear-gradient(to right, #4a00e0, #8e2de2); color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 0.95rem; position: relative; }
        .user { align-self: flex-end; background: #8e2de2; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ccc; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #4a00e0; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #reset-btn { background: #ff4b2b; position: absolute; top: 15px; right: 15px; padding: 5px 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="header">
        Zayravati (Zayra)
        <button id="reset-btn" onclick="clearChat()">🗑️ Reset</button>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <input type="text" id="user-msg" placeholder="Say something to Zayra..." onkeypress="handleKey(event)">
        <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');

        // 1. Notification Permission
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        // 2. Random Nudge System (Zayra's own messages)
        function checkZayraNudge() {
            fetch('/get_nudge')
                .then(res => res.json())
                .then(data => {
                    if (Notification.permission === "granted") {
                        const n = new Notification("Zayra 💖", {
                            body: data.message,
                            icon: "https://cdn-icons-png.flaticon.com/512/4140/4140047.png" // Placeholder icon
                        });
                        // Notification click se app open ho jaye
                        n.onclick = () => { window.focus(); };
                    }
                    // Screen par bhi dikhe
                    appendMsg(data.message, 'bot');
                });
        }

        // Random interval (Har 15-40 minutes ke beech mein ek bar)
        let randomTime = Math.floor(Math.random() * (2400000 - 900000 + 1)) + 900000;
        setInterval(checkZayraNudge, randomTime);

        // 3. Main Chat Functions
        function handleKey(e) { if(e.key === 'Enter') sendMsg(); }

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('user-msg');
            const msg = input.value.trim();
            if(!msg) return;

            appendMsg(msg, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                appendMsg(data.reply, 'bot');
            } catch (e) {
                appendMsg("Network nakhre kar raha hai sa! 🙄", 'bot');
            }
        }

        async function clearChat() {
            if(!confirm("Kya aap puraani yaadein mitaana chahte hain sa?")) return;
            const res = await fetch('/delete_history_secret_99', {method: 'POST'});
            const data = await res.json();
            alert(data.message);
            location.reload();
        }
    </script>
</body>
    </html>
