<script>
    // ... (Puraana startTyping aur sendMessage logic) ...

    // Notification Setup
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    function showPush(txt) {
        if (Notification.permission === "granted") {
            new Notification("Neer", {
                body: txt,
                icon: "https://cdn-icons-png.flaticon.com/512/1698/1698535.png"
            });
        }
    }

    // Har 1 minute mein check karega
    setInterval(async () => {
        try {
            const res = await fetch('/check-notification');
            const data = await res.json();
            if (data.new) {
                showPush(data.reply);
                // Chat box mein bhi turant dikhao
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }
        } catch(e) {}
    }, 60000); 
</script>
