<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zayra AI | Powered by CP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --accent-color: #f472b6; --text-color: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        /* Mobile ke liye full screen aur border-radius zero kar diya hai */
        .chat-container { width: 100%; max-width: 450px; height: 100dvh; background: rgba(30, 41, 59, 1); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* --- Header Section --- */
        .header { padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; background: rgba(244, 114, 182, 0.05); }
        .header-left { display: flex; flex-direction: column; }
        .powered-by { font-size: 0.6rem; letter-spacing: 1.2px; color: rgba(244, 114, 182, 0.7); text-transform: uppercase; margin-bottom: 2px; }
        .header h1 { font-size: 1.5rem; margin: 0; color: white; font-weight: 600; }
        
        /* --- Active Status Dot --- */
        .status-wrapper { display: flex; align-items: center; margin-top: 3px; }
        .status-dot { height: 7px; width: 7px; background-color: #10b981; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        .online-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); font-weight: 400; }
        
        .reset-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; opacity: 0.4; transition: 0.3s; padding: 5px; }
        .reset-btn:hover { opacity: 1; transform: scale(1.1); }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        .user-message { align-self: flex-end; background: var(--accent-color); color: #4c0519; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(244, 114, 182, 0.2); }
        .ai-message { align-self: flex-start; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.03); border-bottom-left-radius: 4px; }
        
        .typing { font-size: 0.8rem; color: var(--accent-color); padding: 8px 25px; display: none; font-style: italic; }
        
        .input-area { padding: 12px 16px 20px 16px; display: flex; gap: 12px; background: rgba(15, 23, 42, 1); border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(244,114,182,0.2); padding: 14px 16px; border-radius: 20px; color: white; outline: none; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.1); }
        
        button#send-btn { background: var(--accent-color); border: none; padding: 0 22px; border-radius: 20px; font-weight: 600; cursor: pointer; color: #4c0519; transition: 0.2s; font-size: 1rem; }
        button#send-btn:active { transform: scale(0.95); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-left">
                <div class="powered-by">POWERED BY CP</div>
                <h1>Zayra</h1>
                <div class="status-wrapper">
                    <span class="status-dot"></span>
                    <span class="online-text">Active now</span>
                </div>
            </div>
            <button class="reset-btn" onclick="clearMemory()" title="Clear Chat History">🗑️</button>
        </div>
        
        <div id="chat-box">
            <div class="message ai-message">Hey! Zayra here.. Kahan gayab ho itni der se? 😘</div>
        </div>
        
        <div id="typing" class="typing">Zayra is typing...</div>
        
        <div class="input-area">
            <input type="text" id="user-input" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typing = document.getElementById('typing');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if(!msg) return;
            addMessage(msg, true);
            userInput.value = '';
            
            // Mobile par keyboard thik se handle karne ke liye focus wapas lana
            userInput.focus();
            
            typing.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                typing.style.display = 'none';
                addMessage(data.reply, false);
            } catch {
                typing.style.display = 'none';
                addMessage("Babu, lagta hai network nakhre kar raha hai! 🙄", false);
            }
        }

        async function clearMemory() {
            if(confirm("Zayra ki saari purani yaadein mita doon?")) {
                const res = await fetch('/delete_history_secret_99', {method: 'POST'});
                const data = await res.json();
                if(data.status === 'success') { 
                    alert(data.message); 
                    location.reload(); 
                }
            }
        }
    </script>
</body>
    </html>
