<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zayra AI</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

#mic{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:70px;
    height:70px;
    border-radius:50%;
    background:#00a884;
    border:none;
    font-size:30px;
    color:white;
}
</style>
</head>

<body>

<canvas id="avatar"></canvas>
<button id="mic">🎤</button>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({canvas:document.getElementById("avatar"), alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);

let light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

camera.position.set(0,1.5,3);

let avatar, mixer;
let blinkTimer = 0;

// 🔥 LOAD YOUR MODEL
const loader = new THREE.GLTFLoader();
loader.load("https://models.readyplayer.me/64d2e8a1b2c3d4e5f6789012.glb"), (gltf)=>{
    avatar = gltf.scene;
    scene.add(avatar);

    mixer = new THREE.AnimationMixer(avatar);
});

// 🎬 LOOP
function animate(){
    requestAnimationFrame(animate);

    if(avatar){
        // head idle movement
        avatar.rotation.y = Math.sin(Date.now()*0.002)*0.2;

        blink();
    }

    renderer.render(scene,camera);
}
animate();

// 👁️ BLINK
function blink(){
    if(!avatar) return;

    blinkTimer += 0.05;

    if(blinkTimer > 3){
        avatar.scale.y = 0.98;
    }
    if(blinkTimer > 3.1){
        avatar.scale.y = 1;
        blinkTimer = 0;
    }
}

// 😊 EMOTION SYSTEM
function setEmotion(type){
    if(!avatar) return;

    if(type==="happy"){
        avatar.rotation.x = 0.05;
    }
    else if(type==="sad"){
        avatar.rotation.x = -0.1;
    }
    else if(type==="angry"){
        avatar.rotation.y += 0.1;
    }
    else{
        avatar.rotation.x = 0;
    }
}

// 🎤 VOICE SYSTEM
let recognition;
let listening=false;
let currentAudio=null;

function initSpeech(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    recognition = new SpeechRecognition();
    recognition.lang="en-IN";

    recognition.onresult = (e)=>{
        let text = e.results[0][0].transcript;
        send(text);
    };

    recognition.onend = ()=>{
        if(listening && !currentAudio){
            recognition.start();
        }
    };
}

// 📡 SEND
async function send(text){
    const res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    });

    const data = await res.json();

    detectEmotion(data.reply);
    speak(data.reply);
}

// 🔊 SPEAK
async function speak(text){
    const res = await fetch("/speak",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    const data = await res.json();

    if(data.audio){
        currentAudio = new Audio(data.audio);

        animateMouth();

        currentAudio.play();

        currentAudio.onended = ()=>{
            if(listening){
                recognition.start();
            }
        };
    }
}

// 👄 TALKING
function animateMouth(){
    if(!avatar) return;

    let interval = setInterval(()=>{
        avatar.scale.y = 1 + Math.random()*0.02;
    },80);

    currentAudio.onended = ()=>{
        clearInterval(interval);
        avatar.scale.y = 1;
    };
}

// 💖 DETECT EMOTION FROM TEXT
function detectEmotion(text){
    text = text.toLowerCase();

    if(text.includes("love") || text.includes("miss")){
        setEmotion("happy");
    }
    else if(text.includes("sad")){
        setEmotion("sad");
    }
    else if(text.includes("angry") || text.includes("gussa")){
        setEmotion("angry");
    }
    else{
        setEmotion("neutral");
    }
}

// 🎤 TOGGLE
document.getElementById("mic").onclick=()=>{
    if(!recognition){
        initSpeech();
    }

    if(!listening){
        listening=true;
        recognition.start();
        document.getElementById("mic").style.background="red";
    }else{
        listening=false;
        recognition.stop();
        document.getElementById("mic").style.background="#00a884";
    }
};
</script>

</body>
</html>
