<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const typing = document.getElementById('typing');
    let typingInterval;

    // --- Typing Animation Logic ---
    function startTypingAnimation() {
        let dots = "";
        typing.style.display = 'block';
        typingInterval = setInterval(() => {
            dots = dots.length < 3 ? dots + "." : "";
            typing.innerText = "typing" + dots;
        }, 500); // Har 0.5 sec mein dot badlega
    }

    function stopTypingAnimation() {
        clearInterval(typingInterval);
        typing.style.display = 'none';
        typing.innerText = "typing..."; // Reset for next time
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
        userInput.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // Animation Start
        startTypingAnimation();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const data = await response.json();
            
            // Animation Stop
            stopTypingAnimation();
            
            chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            stopTypingAnimation();
            chatBox.innerHTML += `<div class="msg ai" style="color:#ef4444;">Abbe net mar gaya tera, refresh kar!</div>`;
        }
    }
        </script>
