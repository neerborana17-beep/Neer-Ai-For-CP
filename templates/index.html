<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({canvas:avatar, alpha:true});
renderer.setSize(innerWidth, innerHeight);

let light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

camera.position.set(0,1.5,3);

let avatar, mixer;
let clock = new THREE.Clock();

const loader = new THREE.GLTFLoader();
loader.load("/static/avatar.glb",(gltf)=>{
    avatar = gltf.scene;
    scene.add(avatar);

    mixer = new THREE.AnimationMixer(avatar);

    // play all animations (hands, idle)
    gltf.animations.forEach(clip=>{
        mixer.clipAction(clip).play();
    });
});

// 🎬 LOOP
function animate(){
    requestAnimationFrame(animate);

    let delta = clock.getDelta();
    if(mixer) mixer.update(delta);

    blink();
    eyeMove();

    renderer.render(scene,camera);
}
animate();

// 👁️ BLINK
let blinkT=0;
function blink(){
    if(!avatar) return;
    blinkT+=0.05;
    if(blinkT>3){
        avatar.scale.y=0.96;
    }
    if(blinkT>3.1){
        avatar.scale.y=1;
        blinkT=0;
    }
}

// 👀 EYE MOVE
function eyeMove(){
    avatar.rotation.y += (Math.random()-0.5)*0.002;
}

// 🎤 SPEECH
let recognition, listening=false;
let audioCtx, analyser, source, dataArray;

function initSpeech(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang="en-IN";
    recognition.continuous=true;

    recognition.onresult = (e)=>{
        let text = e.results[e.results.length-1][0].transcript;
        send(text);
    };

    recognition.onend = ()=>{
        if(listening) recognition.start();
    };
}

// SEND
async function send(text){
    let res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    });

    let data = await res.json();
    speak(data.reply);
}

// 🔊 SPEAK + REAL LIPSYNC
async function speak(text){
    let res = await fetch("/speak",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    let audio = new Audio(data.audio);
    audio.play();

    setupLipSync(audio);

    audio.onended = ()=>{
        if(listening) recognition.start();
    };
}

// 👄 REAL LIP SYNC (Audio → Viseme)
function setupLipSync(audio){
    audioCtx = new AudioContext();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 512;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    function animateMouth(){
        analyser.getByteFrequencyData(dataArray);

        let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;

        // map to mouth open
        let scale = 1 + (avg/255)*0.1;

        if(avatar){
            avatar.scale.y = scale;

            // smile effect
            avatar.rotation.x = (avg/255)*0.05;
        }

        requestAnimationFrame(animateMouth);
    }

    animateMouth();
}

// 🎤 ONE CLICK
mic.onclick=()=>{
    if(!recognition) initSpeech();

    if(!listening){
        listening=true;
        recognition.start();
        mic.style.background="red";
    }
};
        </script>
