<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayra AI | Powered by CP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --accent-color: #f472b6; --text-color: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 90vh; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(244, 114, 182, 0.2); }
        .header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; margin: 0; color: white; }
        .reset-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .reset-btn:hover { opacity: 1; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
        .user-message { align-self: flex-end; background: var(--accent-color); color: #4c0519; }
        .ai-message { align-self: flex-start; background: rgba(255,255,255,0.05); }
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(244,114,182,0.2); padding: 12px; border-radius: 10px; color: white; outline: none; }
        button#send-btn { background: var(--accent-color); border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .typing { font-size: 0.8rem; color: var(--accent-color); padding: 5px 20px; display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div>
                <small style="color: grey; font-size: 10px;">POWERED BY CP</small>
                <h1>Zayra</h1>
            </div>
            <button class="reset-btn" onclick="clearMemory()" title="Clear Chat">🗑️</button>
        </div>
        <div id="chat-box"></div>
        <div id="typing" class="typing">Zayra is thinking...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Kuch bolo na..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typing = document.getElementById('typing');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if(!msg) return;
            addMessage(msg, true);
            userInput.value = '';
            typing.style.display = 'block';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                typing.style.display = 'none';
                addMessage(data.reply, false);
            } catch {
                typing.style.display = 'none';
                addMessage("Oops, net nakhre kar raha! 🙄", false);
            }
        }

        async function clearMemory() {
            if(confirm("Saari yaadein mita doon?")) {
                const res = await fetch('/delete_history_secret_99', {method: 'POST'});
                const data = await res.json();
                if(data.status === 'success') { alert(data.message); location.reload(); }
            }
        }
    </script>
</body>
</html>
