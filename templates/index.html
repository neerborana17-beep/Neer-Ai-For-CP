<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayra - Udaipur</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header Left Aligned */
        #header { background: #1e1e2e; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        #header-left { text-align: left; }
        .status { font-size: 0.7rem; color: #2ecc71; margin-top: 2px; }
        .dot { height: 7px; width: 7px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 4px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: #ff4b91; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #2a2a3c; color: white; border-bottom-left-radius: 2px; }

        /* --- Typing Indicator: Just above input --- */
        #typing-box { display: none; padding: 5px 20px; font-size: 0.8rem; color: #ff4b91; font-style: italic; background: #121212; }

        #input-area { padding: 12px; display: flex; gap: 10px; background: #1e1e2e; align-items: center; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; background: #2a2a3c; color: white; font-size: 0.95rem; }
        button { background: #ff4b91; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="header">
        <div id="header-left">
            <span style="font-weight: bold; font-size: 1.1rem;">Zayra</span><br>
            <span class="status"><span class="dot"></span>Active now</span>
        </div>
        <button onclick="clearChat()" style="background:none; width:auto; height:auto;">🗑️</button>
    </div>

    <div id="chat-box"></div>

    <div id="typing-box">Zayra is thinking...</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Zayra se kuch pucho..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">➤</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const typingBox = document.getElementById('typing-box');

        function appendMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;

            appendMsg(msg, 'user');
            input.value = '';
            
            // Show Typing Box
            typingBox.style.display = 'block';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();

                typingBox.style.display = 'none';
                
                // Fix: Check if reply exists before appending
                if(data && data.reply) {
                    appendMsg(data.reply, 'bot');
                } else {
                    appendMsg("Hukum, kuch samajh nahi aaya, phir se bolenge? 🙄", 'bot');
                }

            } catch (e) {
                typingBox.style.display = 'none';
                appendMsg("Hukum, net thoda dheere chal raha hai sa! 🙄", 'bot');
            }
        }

        async function clearChat() {
            if(confirm("Yaadein mita dein hukum?")) {
                await fetch('/delete_history_secret_99', {method: 'POST'});
                location.reload();
            }
        }
    </script>
</body>
        </html>
