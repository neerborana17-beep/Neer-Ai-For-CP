<script>
    // Browser Notification Setup
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    // Har 60 second mein backend se poochega ki Neer ne randomly kuch bheja kya
    setInterval(async () => {
        try {
            const res = await fetch('/check-notification');
            const data = await res.json();
            if (data.new) {
                // Phone notification dikhao
                if (Notification.permission === "granted") {
                    new Notification("Neer", {
                        body: data.reply,
                        icon: "https://cdn-icons-png.flaticon.com/512/1698/1698535.png"
                    });
                }
                // Chat screen par bhi update karo
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }
        } catch(e) {}
    }, 60000);
            </script>
