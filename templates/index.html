<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zayra AI</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<style>
body{margin:0;background:black;overflow:hidden;}
#mic{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:70px;height:70px;border-radius:50%;
    background:#00a884;border:none;font-size:30px;color:white;
}
</style>
</head>

<body>

<canvas id="avatar"></canvas>
<button id="mic">🎤</button>

<script>
const canvas = document.getElementById("avatar");
const mic = document.getElementById("mic");

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true});
renderer.setSize(innerWidth, innerHeight);

let light = new THREE.HemisphereLight(0xffffff,0x444444);
scene.add(light);

camera.position.set(0,1.5,3);

let avatar=null, mixer=null;
let clock = new THREE.Clock();

// LOAD MODEL (OPTIONAL)
const loader = new THREE.GLTFLoader();
loader.load("/static/avatar.glb",(gltf)=>{
    avatar = gltf.scene;
    scene.add(avatar);

    if(gltf.animations && gltf.animations.length){
        mixer = new THREE.AnimationMixer(avatar);
        gltf.animations.forEach(clip=>{
            mixer.clipAction(clip).play();
        });
    }
}, undefined, ()=>{console.log("No avatar, voice only mode");});

// LOOP
function animate(){
    requestAnimationFrame(animate);

    let delta = clock.getDelta();
    if(mixer) mixer.update(delta);

    if(avatar){
        avatar.rotation.y += (Math.random()-0.5)*0.002;
        blink();
    }

    renderer.render(scene,camera);
}
animate();

// BLINK
let blinkT=0;
function blink(){
    blinkT+=0.05;
    if(blinkT>3 && avatar){
        avatar.scale.y=0.96;
    }
    if(blinkT>3.1 && avatar){
        avatar.scale.y=1;
        blinkT=0;
    }
}

// SPEECH
let recognition, listening=false;
let audioCtx, analyser, dataArray;
let lipActive=false;

function initSpeech(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang="en-IN";
    recognition.continuous=true;

    recognition.onresult = (e)=>{
        let text = e.results[e.results.length-1][0].transcript;
        send(text);
    };

    recognition.onend = ()=>{
        if(listening) recognition.start();
    };
}

// SEND
async function send(text){
    let res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    });

    let data = await res.json();
    speak(data.reply);
}

// SPEAK
async function speak(text){
    let res = await fetch("/speak",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    let audio = new Audio(data.audio);
    audio.play();

    setupLipSync(audio);

    audio.onended = ()=>{
        lipActive=false;
        if(avatar) avatar.scale.y=1;
        if(listening) recognition.start();
    };
}

// LIPSYNC FIXED
function setupLipSync(audio){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 512;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    lipActive = true;

    function animateMouth(){
        if(!lipActive) return;

        analyser.getByteFrequencyData(dataArray);
        let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;

        if(avatar){
            avatar.scale.y = 1 + (avg/255)*0.1;
        }

        requestAnimationFrame(animateMouth);
    }

    animateMouth();
}

// MIC ONE CLICK
mic.onclick=()=>{
    if(!recognition) initSpeech();

    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(!listening){
        listening=true;
        recognition.start();
        mic.style.background="red";
    }
};
</script>

</body>
</html>
