<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const typing = document.getElementById('typing');

    // 🔊 MALE VOICE ENGINE (Optimized)
    function speak(text) {
        window.speechSynthesis.cancel(); 
        const speech = new SpeechSynthesisUtterance(text);
        
        // Sabhi voices load karo aur Male voice dhoondo
        let voices = window.speechSynthesis.getVoices();
        let selectedVoice = voices.find(v => v.name.includes('Male') || v.name.includes('Google hindi')) || voices[0];
        
        speech.voice = selectedVoice;
        speech.lang = 'hi-IN';
        speech.pitch = 0.85; // 0.8-0.9 se awaaz bhari aur dosti wali lagti hai
        speech.rate = 1.05;  // Thodi fast speed taaki natural lage
        
        window.speechSynthesis.speak(speech);
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
        userInput.value = '';
        typing.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Speed Fix: Timeout 8 second tak limit kiya hai
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            
            typing.style.display = 'none';
            
            // UI Update aur Voice ek sath trigger
            const aiMsg = `<div class="msg ai">${data.reply}</div>`;
            chatBox.insertAdjacentHTML('beforeend', aiMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            speak(data.reply); 

        } catch (e) {
            typing.style.display = 'none';
            console.log("Slow connection!");
        }
    }

    // Voice to Text (Mic) Logic
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.onstart = () => document.getElementById('mic-btn').classList.add('listening');
        recognition.onend = () => document.getElementById('mic-btn').classList.remove('listening');
        recognition.onresult = (e) => {
            userInput.value = e.results[0][0].transcript;
            sendMessage();
        };
        recognition.start();
    }
        </script>
